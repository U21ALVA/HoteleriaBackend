# ============================================
# HOTELERIA QUANTUM - Backend Configuration
# ============================================
# Todas las variables se pueden sobrescribir con variables de entorno
# o creando un archivo application-local.yml (ver README)
# ============================================

spring:
  application:
    name: hoteleria-quantum

  # --- Profiles: activar 'local' para sobrescribir config ---
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # --- Database ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:hoteleria_quantum}?stringtype=unspecified
    username: ${DB_USER:hoteleria_user}
    password: "${DB_PASSWORD:HQ_s3cur3_2026!}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Lima

  # --- Jackson ---
  jackson:
    time-zone: America/Lima
    date-format: yyyy-MM-dd'T'HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# --- JWT ---
app:
  jwt:
    secret: ${JWT_SECRET:HQ_jwt_s3cr3t_k3y_2026_quantum_hotel_system_ultra_secure_padding!}
    expiration-ms: ${JWT_EXPIRATION_MS:1800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# --- Logging ---
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.hoteleria.quantum: ${LOG_LEVEL_APP:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
